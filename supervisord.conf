[supervisord]
nodaemon=true

[program:shiny]
command=R -q -e "shiny::runApp('/usr/no-code-app', host='0.0.0.0', port=3838)"
user=shiny
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr

[program:fastapi]
command=/bin/bash -c "source /opt/miniconda/bin/activate fastapi-ml && uvicorn py/main:app --host 0.0.0.0 --port 8000"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr

