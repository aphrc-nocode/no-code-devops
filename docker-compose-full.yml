services:
  no-code-app:
    build:
      context: ..
      dockerfile: no-code-devops/Dockerfile
    container_name: no-code-app
    restart: always
    ports:
      - "3838:3838"
    volumes:
      - datasets:/usr/no-code-app/datasets
      - log_files:/usr/no-code-app/.log_files
      - models:/usr/no-code-app/models
      - recipes:/usr/no-code-app/recipes
      - outputs:/usr/no-code-app/outputs
      - output:/usr/no-code-app/output
      - logs:/usr/no-code-app/logs
      - ../no-code-app/.env:/usr/no-code-app/.env:ro
    networks:
      - nocode-network
    environment:
      - FASTAPI_BASE=http://no-code-pycaret:8000

  no-code-pycaret:
    build:
      context: ..
      dockerfile: no-code-devops/pycaret/Dockerfile
    container_name: no-code-pycaret
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - models:/usr/no-code-pycaret/models
      - logs:/usr/no-code-pycaret/logs
    networks:
      - nocode-network

volumes:
  datasets:
  log_files:
  models:
  recipes:
  outputs:
  output:
  logs:

networks:
  nocode-network:
    driver: bridge
