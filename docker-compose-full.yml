services:
  no-code-app:
    build:
      context: ..
      dockerfile: no-code-devops/Dockerfile
    container_name: no-code-app
    restart: always
    ports:
      - "3838:3838"
    volumes:
      - datasets:/usr/no-code-app/datasets
      - log_files:/usr/no-code-app/.log_files
      - models:/usr/no-code-app/models
      - recipes:/usr/no-code-app/recipes
      - outputs:/usr/no-code-app/outputs
      - output:/usr/no-code-app/output
      - logs:/usr/no-code-app/logs
      - ../no-code-app/.env:/usr/no-code-app/.env:ro
    networks:
      - nocode-network
    environment:
      - FASTAPI_BASE=http://no-code-pycaret:8000
      - REDIS_URL=redis://no-code-redis:6379/0
      - R_CARET_MAX_WORKERS=15
    deploy:
      resources:
        limits:
          memory: 30G
          cpus: '12'
        reservations:
          memory: 15G
          cpus: '6'

  no-code-pycaret:
    build:
      context: ..
      dockerfile: no-code-devops/pycaret/Dockerfile
    container_name: no-code-pycaret
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - models:/usr/no-code-pycaret/models
      - logs:/usr/no-code-pycaret/logs
    networks:
      - nocode-network
    environment:
      - REDIS_URL=redis://no-code-redis:6379/0
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'
        reservations:
          memory: 2G
          cpus: '2'

  no-code-redis:
    image: redis:7-alpine
    container_name: no-code-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - nocode-network
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
        reservations:
          memory: 512M
          cpus: '0.5'

  celery-worker-1:
    build:
      context: ..
      dockerfile: no-code-devops/pycaret/Dockerfile.worker
    container_name: celery-worker-1
    restart: always
    volumes:
      - models:/usr/no-code-pycaret/models
      - logs:/usr/no-code-pycaret/logs
    networks:
      - nocode-network
    environment:
      - REDIS_URL=redis://no-code-redis:6379/0
    command: celery -A celery_app worker --loglevel=info --concurrency=10
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
        reservations:
          memory: 2G
          cpus: '1'

  celery-worker-2:
    build:
      context: ..
      dockerfile: no-code-devops/pycaret/Dockerfile.worker
    container_name: celery-worker-2
    restart: always
    volumes:
      - models:/usr/no-code-pycaret/models
      - logs:/usr/no-code-pycaret/logs
    networks:
      - nocode-network
    environment:
      - REDIS_URL=redis://no-code-redis:6379/0
    command: celery -A celery_app worker --loglevel=info --concurrency=10

  celery-worker-3:
    build:
      context: ..
      dockerfile: no-code-devops/pycaret/Dockerfile.worker
    container_name: celery-worker-3
    restart: always
    volumes:
      - models:/usr/no-code-pycaret/models
      - logs:/usr/no-code-pycaret/logs
    networks:
      - nocode-network
    environment:
      - REDIS_URL=redis://no-code-redis:6379/0
    command: celery -A celery_app worker --loglevel=info --concurrency=10

  celery-worker-4:
    build:
      context: ..
      dockerfile: no-code-devops/pycaret/Dockerfile.worker
    container_name: celery-worker-4
    restart: always
    volumes:
      - models:/usr/no-code-pycaret/models
      - logs:/usr/no-code-pycaret/logs
    networks:
      - nocode-network
    environment:
      - REDIS_URL=redis://no-code-redis:6379/0
    command: celery -A celery_app worker --loglevel=info --concurrency=10

  celery-worker-5:
    build:
      context: ..
      dockerfile: no-code-devops/pycaret/Dockerfile.worker
    container_name: celery-worker-5
    restart: always
    volumes:
      - models:/usr/no-code-pycaret/models
      - logs:/usr/no-code-pycaret/logs
    networks:
      - nocode-network
    environment:
      - REDIS_URL=redis://no-code-redis:6379/0
    command: celery -A celery_app worker --loglevel=info --concurrency=10

volumes:
  datasets:
  log_files:
  models:
  recipes:
  outputs:
  output:
  logs:
  redis_data:

networks:
  nocode-network:
    driver: bridge
